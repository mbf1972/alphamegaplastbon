            <button class="menu-btn" style="cursor: pointer;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>

            <button class="menu-btn" style="cursor: pointer;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><rect x="2" y="4" width="20" height="16" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>

                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>

                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>

                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>

        </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <h2>Accès Sécurisé</h2>
            <p>Veuillez entrer le mot de passe</p>
            <input type="password" id="auth-password" placeholder="Mot de passe">
            <button id="auth-btn">Valider</button>
            <p id="auth-error" style="color: #e74c3c; display: none; margin-top: 10px; font-size: 0.9rem;">Mot de passe incorrect</p>
        </div>
    </div>

    <script>
        // === Auth Logic ===
        const authOverlay = document.getElementById('auth-overlay');
        const authPassword = document.getElementById('auth-password');
        const authBtn = document.getElementById('auth-btn');
        const authError = document.getElementById('auth-error');

        const EXPECTED_HASH = "d30ea69ba67ff9c8c9d52a2d202edb26d1a619b0baed813de401ec2dbf392448";

        // Check Auth Status from localStorage (lasts 12 hours)
        function checkAuthStatus() {
            const authData = JSON.parse(localStorage.getItem('auth_data') || '{}');
            const now = new Date().getTime();
            if (authData.passed === 'true' && (now - authData.time < 12 * 60 * 60 * 1000)) {
                return true;
            }
            return false;
        }

        if (checkAuthStatus()) {
            authOverlay.style.display = 'none';
        }

        async function hashString(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkAuth() {
            const pwd = authPassword.value;
            if (!pwd) return;
            
            authBtn.textContent = 'Vérification...';
            authBtn.disabled = true;
            
            const hash = await hashString(pwd);
            if (hash === EXPECTED_HASH) {
                const now = new Date().getTime();
                localStorage.setItem('auth_data', JSON.stringify({ passed: 'true', time: now }));
                authOverlay.style.opacity = '0';
                setTimeout(() => {
                    authOverlay.style.display = 'none';
                }, 300);
            } else {
                authError.style.display = 'block';
                authPassword.value = '';
                authPassword.focus();
                
                // Shake animation
                authBtn.style.animation = 'none';
                void authBtn.offsetWidth;
                authBtn.style.animation = 'shake 0.4s ease';
            }
            
            authBtn.textContent = 'Valider';
            authBtn.disabled = false;
        }

        if (authBtn) {
            authBtn.addEventListener('click', checkAuth);
            authPassword.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkAuth();
            });
        }
        
        // Setup shake keyframes if not present
        if (!document.getElementById('shake-style')) {
            const shakeStyle = document.createElement('style');
            shakeStyle.id = 'shake-style';
            shakeStyle.textContent = `
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    20% { transform: translateX(-8px); }
                    40% { transform: translateX(8px); }
                    60% { transform: translateX(-5px); }
                    80% { transform: translateX(5px); }
                }
            `;
            document.head.appendChild(shakeStyle);
        }

        // === Tarif PDF Logic ===
        const btnTarif = document.getElementById('btn-tarif');
        if (btnTarif) {
            btnTarif.addEventListener('click', async function() {
                const originalHtml = this.innerHTML;
                this.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg> Génération...';
                this.disabled = true;

                try {
                    const GOOGLE_SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNG2S1-QVKJhPCWzFArxIcRCEZyX5A8LJdZJ-UgZzIERvGNiZ001Va_Z4qJXCXxn7u/exec";
                    // Using POST instead of GET for PDF to avoid URL length limits and structure similarly to bon
                    const response = await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'getTarifPdf' }),
                        headers: { "Content-Type": "text/plain;charset=utf-8" }
                    });
                    
                    const result = await response.json();

                    if (result.status === "Success") {
                        const linkSource = `data:application/pdf;base64,${result.base64}`;
                        const downloadLink = document.createElement("a");
                        downloadLink.href = linkSource;
                        downloadLink.download = result.fileName || "Tarif_AMplast.pdf";
                        downloadLink.click();
                        
                        this.innerHTML = '✓ Téléchargé !';
                        this.style.background = '#2dc770';
                        this.style.color = '#fff';
                        this.style.border = 'none';
                    } else {
                        console.error("Erreur Script:", result.message);
                        alert("Erreur: " + result.message);
                        this.innerHTML = '❌ Erreur';
                        this.style.background = '#e74c3c';
                        this.style.color = '#fff';
                        this.style.border = 'none';
                    }
                } catch(e) {
                    console.error("Erreur réseau:", e);
                    alert("Erreur de connexion au serveur.");
                    this.innerHTML = '❌ Erreur';
                    this.style.background = '#e74c3c';
                    this.style.color = '#fff';
                    this.style.border = 'none';
                }

                setTimeout(() => {
                    this.innerHTML = originalHtml;
                    this.style.background = '';
                    this.style.color = '';
                    this.style.border = '';
                    this.disabled = false;
                }, 3000);
            });
        }
    </script>
</body>
</html>
