<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Devis - Création et gestion de devis">
    <meta name="theme-color" content="#00aeef">
    <title>Devis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        const authData = JSON.parse(localStorage.getItem('auth_data') || '{}');
        const now = new Date().getTime();
        if (!(authData.passed === 'true' && (now - authData.time < 12 * 60 * 60 * 1000))) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>

    <!-- Title -->
    <header class="app-header" id="app-header">
        <h1 class="title">Devis</h1>
    </header>

    <!-- Client Info -->
    <section class="info-section" id="info-section">
        <div class="info-row">
            <div class="info-field full">
                <label for="date-devis">Date</label>
                <input type="text" id="date-devis" placeholder="jj/mm/aaaa" maxlength="10" inputmode="numeric">
            </div>
            <div class="info-field full">
                <label for="num-devis-display">N° Devis</label>
                <div id="num-devis-display" style="height: 32px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: #333333; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);">000000</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-field full">
                <label for="client-nom">Client</label>
                <input type="text" id="client-nom" placeholder="Nom du client">
            </div>
        </div>
        <div class="info-row">
            <div class="info-field full">
                <label for="client-adresse">Adresse</label>
                <input type="text" id="client-adresse" placeholder="Adresse du client">
            </div>
        </div>
    </section>

    <!-- Input Row -->
    <section class="input-section" id="input-section">
        <div class="input-group">
            <label for="qte">Qte</label>
            <input type="number" id="qte" min="0" inputmode="numeric">
        </div>
        <div class="input-group">
            <label for="diam">Diam</label>
            <input type="number" id="diam" min="0" inputmode="numeric">
        </div>
        <div class="input-group">
            <label for="long">Long</label>
            <input type="number" id="long" min="0" step="any" inputmode="decimal">
        </div>
        <div class="input-group">
            <label for="prix">Prix</label>
            <input type="number" id="prix" min="0" step="any" inputmode="decimal">
        </div>
        <div class="input-group">
            <label for="sr">SR</label>
            <select id="sr">
                <option value="S1">S1</option>
                <option value="S2">S2</option>
            </select>
        </div>
        <div class="input-group">
            <label for="color">Color</label>
            <input type="text" id="color">
        </div>
    </section>

    <!-- Valider Button -->
    <section class="btn-section" id="btn-valider-section">
        <button class="btn-valider" id="btn-valider">Valider</button>
    </section>

    <!-- Items Display Area (white zone) -->
    <section class="items-zone" id="items-zone">
        <!-- Items will be inserted here -->
    </section>

    <!-- Total Général -->
    <section class="total-section" id="total-section" style="display: none;">
        <div class="total-bar">
            <span class="total-label">Total Général :</span>
            <span class="total-value" id="total-general">0,00</span>
        </div>
    </section>

    <!-- Actions -->
    <section class="btn-section" id="btn-pdf-section">
        <button class="btn-pdf" id="btn-pdf">PDF</button>
    </section>
    <script src="devis.js"></script>
</body>
</html>
